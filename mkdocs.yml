site_name: Diskstore
nav:
  - Home: index.md
  - API: api.md
theme: readthedocs

# plugins:
# - search
# - mkdocstrings

plugins:
- search
- mkdocstrings:
    enabled: !ENV [ENABLE_MKDOCSTRINGS, true]
    #custom_templates: templates
    default_handler: python
    locale: en
    handlers:
      python:
        paths: [src]
        options:
          docstring_style: google
          show_source: false
          heading_level: 2
          show_root_heading: true
          show_root_full_path: true
